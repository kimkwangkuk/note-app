function redrawCanvas(){
  if(!ctx||!canvasEl) return;
  const w = canvasEl._cssW, h = canvasEl._cssH;
  const nb = getNotebook(state.notebookId);
  const pg = nb&&nb.pages[state.pageIdx];
  drawPaper(ctx, w, h, nb?.type||'default', pg?.date, pg?.date ? (db.studyRecords[pg.date]||0) : 0);
  getPageStrokes(pg).forEach(s=>drawStroke(ctx,s,w,h));
}

// ─── PAPER DRAWING ──────────────────────────────
function drawPaper(c, w, h, type, dateVal, studyTime){
  c.save();
  // White background
  c.fillStyle = '#FFFFFF'; c.fillRect(0,0,w,h);
  // Header area
  const hh = Math.round(h*HEADER_RATIO);
  c.fillStyle = '#FAFAF8'; c.fillRect(0,0,w,hh);
  c.strokeStyle = '#E2E1DD'; c.lineWidth = 0.7;
  c.beginPath(); c.moveTo(0,hh); c.lineTo(w,hh); c.stroke();
  // Body
  if(type === 'daily'){
    drawDailyPlannerBody(c, w, h, hh, studyTime||0);
  } else if(type === 'weekly'){
    drawWeeklyBody(c, w, h, hh, dateVal);
  } else if(type === 'monthly'){
    drawMonthlyBody(c, w, h, hh, dateVal);
  } else {
    drawLinedBody(c, w, h, hh);
  }
  c.restore();
}

function drawLinedBody(c, w, h, hh){
  // Red margin line
  c.strokeStyle = '#F0BFBF'; c.lineWidth = 0.8;
  c.beginPath(); c.moveTo(Math.round(w*0.046),hh); c.lineTo(Math.round(w*0.046),h); c.stroke();
  // Horizontal ruled lines
  const bodyH = h-hh, lineSpacing = Math.round(bodyH/28), startY = hh+lineSpacing;
  c.strokeStyle = '#E8E7E3'; c.lineWidth = 0.5;
  for(let y=startY; y<h-2; y+=lineSpacing){
    c.beginPath(); c.moveTo(0,y); c.lineTo(w,y); c.stroke();
  }
}

function drawDailyPlannerBody(c, w, h, hh, studyTime){
  const bodyTop = hh;
  const bodyH = h - hh;

  const labelW    = Math.round(w * 0.09);
  const scheduleX = Math.round(w * 0.625);
  const blockAreaW = scheduleX - labelW;

  const START_HOUR = 5;
  const TOTAL_HOURS = 24;        // 5:00 ~ 익일 5:00
  const BLOCKS_PER_HOUR = 6;     // 10분 단위
  const TOTAL_BLOCKS = TOTAL_HOURS * BLOCKS_PER_HOUR; // 144
  const hourH = bodyH / TOTAL_HOURS;
  const blockW = blockAreaW / BLOCKS_PER_HOUR;

  // 공부 시간 블럭 계산
  const filledSecs = Math.floor(studyTime || 0);
  const filledFull = Math.floor(filledSecs / 600);     // 완전히 채워진 블럭 수
  const partialFrac = (filledSecs % 600) / 600;        // 마지막 블럭 채움 비율

  const FILL_COLOR    = '#7EB3D9';
  const FILL_LIGHT    = '#D4EAF7';
  const EMPTY_STROKE  = '#ECEAE6';
  const LINE_COLOR    = '#D8D7D3';
  const LABEL_COLOR   = '#B8B7B3';

  for(let i = 0; i < TOTAL_HOURS; i++){
    const y = bodyTop + i * hourH;
    const hour = (START_HOUR + i) % 24;
    const isMidnight = hour === 0;

    // 시간 레이블
    const fs = Math.max(6.5, Math.round(hourH * 0.34));
    c.fillStyle = isMidnight ? '#9A9997' : LABEL_COLOR;
    c.font = `${isMidnight ? '600' : '400'} ${fs}px system-ui, sans-serif`;
    c.textAlign = 'right'; c.textBaseline = 'middle';
    c.fillText(String(hour).padStart(2,'0'), labelW - 4, y + hourH * 0.5);

    // 시간 구분선
    c.strokeStyle = isMidnight ? '#C8C7C3' : LINE_COLOR;
    c.lineWidth = isMidnight ? 0.9 : 0.45;
    c.beginPath(); c.moveTo(labelW, y); c.lineTo(scheduleX, y); c.stroke();

    // 10분 블럭 6개
    for(let b = 0; b < BLOCKS_PER_HOUR; b++){
      const blockIdx = i * BLOCKS_PER_HOUR + b;
      const bx = labelW + b * blockW;
      const gap = 1.2;
      const rx = bx + gap, ry = y + gap;
      const rw = blockW - gap * 2, rh = hourH - gap * 2;

      if(blockIdx < filledFull){
        // 완전 채움
        c.fillStyle = FILL_COLOR;
        c.fillRect(rx, ry, rw, rh);
      } else if(blockIdx === filledFull && partialFrac > 0){
        // 부분 채움
        c.fillStyle = FILL_LIGHT;
        c.fillRect(rx, ry, rw, rh);
        c.fillStyle = FILL_COLOR;
        c.fillRect(rx, ry, rw * partialFrac, rh);
      } else {
        // 빈 블럭 (테두리만)
        c.strokeStyle = EMPTY_STROKE; c.lineWidth = 0.4;
        c.strokeRect(rx + 0.2, ry + 0.2, rw - 0.4, rh - 0.4);
      }
    }
  }

  // 마지막 라인
  const endY = Math.min(bodyTop + TOTAL_HOURS * hourH, h);
  c.strokeStyle = LINE_COLOR; c.lineWidth = 0.45;
  c.beginPath(); c.moveTo(labelW, endY); c.lineTo(scheduleX, endY); c.stroke();

  // 수직선 (레이블 구분)
  c.strokeStyle = '#D0CFCB'; c.lineWidth = 0.5;
  c.beginPath(); c.moveTo(labelW, bodyTop); c.lineTo(labelW, h); c.stroke();
  // 수직선 (스케줄 | 오른쪽 패널)
  c.strokeStyle = '#CCCBC8'; c.lineWidth = 0.7;
  c.beginPath(); c.moveTo(scheduleX, bodyTop); c.lineTo(scheduleX, h); c.stroke();

  drawPlannerRightPanel(c, w, h, bodyTop, bodyH, scheduleX);
}

function drawPlannerRightPanel(c, w, h, bodyTop, bodyH, leftX){
  const padL = leftX + 14;
  const padR = w - 12;

  // ── TODAY 섹션 (상단 38%) ──
  const taskSectionH = Math.round(bodyH * 0.38);
  const fs = Math.max(6.5, Math.round(w * 0.0095));

  c.fillStyle = '#C4C3BF';
  c.font = `700 ${fs}px system-ui, sans-serif`;
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText('TODAY', padL, bodyTop + 9);

  const taskTop = bodyTop + Math.round(fs * 2.6);
  const taskAreaH = taskSectionH - (taskTop - bodyTop);
  const itemH = taskAreaH / 3;

  for(let i = 0; i < 3; i++){
    const iy  = taskTop + i * itemH;
    const cy  = iy + itemH * 0.5;
    const r   = Math.min(9, itemH * 0.27);

    // 번호 원
    c.strokeStyle = '#DDDCDA'; c.lineWidth = 0.85;
    c.beginPath(); c.arc(padL + r, cy, r, 0, Math.PI * 2); c.stroke();
    c.fillStyle = '#CECDC9';
    c.font = `500 ${Math.round(r * 1.15)}px system-ui, sans-serif`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(String(i + 1), padL + r, cy);

    // 쓰는 줄
    c.strokeStyle = '#E6E5E1'; c.lineWidth = 0.45;
    c.beginPath(); c.moveTo(padL + r*2 + 7, cy + 1); c.lineTo(padR, cy + 1); c.stroke();

    // 항목 구분선
    if(i < 2){
      c.strokeStyle = '#F2F1EE'; c.lineWidth = 0.32;
      c.beginPath(); c.moveTo(leftX + 5, iy + itemH); c.lineTo(padR, iy + itemH); c.stroke();
    }
    c.textAlign = 'left'; c.textBaseline = 'top';
  }

  // 섹션 구분선
  const divY = bodyTop + taskSectionH;
  c.strokeStyle = '#D4D3CF'; c.lineWidth = 0.6;
  c.beginPath(); c.moveTo(leftX + 5, divY); c.lineTo(padR, divY); c.stroke();

  // ── MEMO 섹션 (하단 62%) ──
  c.fillStyle = '#C4C3BF';
  c.font = `700 ${fs}px system-ui, sans-serif`;
  c.textAlign = 'left'; c.textBaseline = 'top';
  c.fillText('MEMO', padL, divY + 9);

  const noteTop = divY + Math.round(fs * 2.6);
  const noteH   = h - noteTop - 8;
  const lineCount = Math.max(7, Math.floor(noteH / 19));
  const lineSpacing = noteH / lineCount;

  c.strokeStyle = '#EEEDEA'; c.lineWidth = 0.4;
  for(let i = 1; i <= lineCount; i++){
    const ly = noteTop + i * lineSpacing;
    c.beginPath(); c.moveTo(leftX + 5, ly); c.lineTo(padR, ly); c.stroke();
  }
}

function drawWeeklyBody(c, w, h, hh, dateVal){
  const pad = Math.round(w * 0.045);
  const bodyTop = hh + 6;
  const bodyH = h - hh - 10;

  // Parse ISO week → get Mon~Sun dates
  let weekDays = null; // [{label:'월', date:'06/09'}, ...]
  if(dateVal && /^\d{4}-W\d{2}$/.test(dateVal)){
    const [yearStr, wStr] = dateVal.split('-W');
    const year = parseInt(yearStr), week = parseInt(wStr);
    // Jan 4 is always in week 1
    const jan4 = new Date(year, 0, 4);
    const monday = new Date(jan4);
    monday.setDate(jan4.getDate() - ((jan4.getDay()+6)%7) + (week-1)*7);
    const dayNames = ['월','화','수','목','금','토','일'];
    weekDays = dayNames.map((name, i) => {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      return { name, label: `${d.getMonth()+1}/${d.getDate()}`, isWeekend: i >= 5 };
    });
  }

  // Layout: 7 columns (Mon–Sun)
  const cols = 7;
  const colW = (w - pad*2) / cols;

  // Day header row
  const dayHeaderH = Math.round(bodyH * 0.07);
  const dayNames = ['월','화','수','목','금','토','일'];

  for(let i = 0; i < cols; i++){
    const x = pad + i * colW;
    const isWeekend = i >= 5;

    // Column background (weekend slightly tinted)
    if(isWeekend){
      c.fillStyle = '#FAFAF8';
      c.fillRect(x, bodyTop, colW, bodyH);
    }

    // Day name
    c.fillStyle = isWeekend ? '#C8A0A0' : '#AEADAB';
    c.font = `700 ${Math.max(6, Math.round(colW * 0.15))}px system-ui, sans-serif`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(dayNames[i], x + colW/2, bodyTop + dayHeaderH * 0.38);

    // Date number if week selected
    if(weekDays){
      c.fillStyle = isWeekend ? '#C8A0A0' : '#444341';
      c.font = `400 ${Math.max(6, Math.round(colW * 0.22))}px system-ui, sans-serif`;
      c.fillText(weekDays[i].label, x + colW/2, bodyTop + dayHeaderH * 0.78);
    }

    // Vertical divider (except first)
    if(i > 0){
      c.strokeStyle = '#E4E3DF'; c.lineWidth = 0.5;
      c.beginPath(); c.moveTo(x, bodyTop); c.lineTo(x, bodyTop + bodyH); c.stroke();
    }
  }

  // Horizontal line under day header
  c.strokeStyle = '#D8D7D3'; c.lineWidth = 0.7;
  c.beginPath(); c.moveTo(pad, bodyTop + dayHeaderH); c.lineTo(w - pad, bodyTop + dayHeaderH); c.stroke();

  // Ruled lines in each column
  const ruledTop = bodyTop + dayHeaderH + 4;
  const ruledH = bodyH - dayHeaderH - 4;
  const lineCount = Math.floor(ruledH / Math.max(14, ruledH / 18));
  const lineSpacing = ruledH / lineCount;

  c.strokeStyle = '#EEEDEA'; c.lineWidth = 0.4;
  for(let row = 1; row <= lineCount; row++){
    const y = ruledTop + row * lineSpacing;
    c.beginPath(); c.moveTo(pad, y); c.lineTo(w - pad, y); c.stroke();
  }
}

function drawMonthlyBody(c, w, h, hh, dateVal){
  const bodyTop = hh + 4;
  const bodyH = h - hh - 8;
  const pad = Math.round(w * 0.04);

  // Parse month
  let year = null, month = null;
  if(dateVal && /^\d{4}-\d{2}$/.test(dateVal)){
    year = parseInt(dateVal.slice(0,4));
    month = parseInt(dateVal.slice(5,7)) - 1; // 0-indexed
  }

  // Day-of-week header
  const days = ['월','화','수','목','금','토','일'];
  const colW = (w - pad*2) / 7;
  const headerH = Math.round(bodyH * 0.06);

  c.font = `600 ${Math.max(7, Math.round(colW * 0.18))}px system-ui, sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  days.forEach((d,i)=>{
    const x = pad + i*colW + colW/2;
    c.fillStyle = i >= 5 ? '#C8B0B0' : '#AEADAB';
    c.fillText(d, x, bodyTop + headerH/2);
  });

  // Horizontal line under header
  c.strokeStyle = '#E0DFDB'; c.lineWidth = 0.7;
  c.beginPath(); c.moveTo(pad, bodyTop+headerH); c.lineTo(w-pad, bodyTop+headerH); c.stroke();

  // Calendar grid: 6 rows × 7 days
  const gridTop = bodyTop + headerH;
  const gridH = bodyH - headerH;
  const rowH = gridH / 6;

  // Grid lines
  c.strokeStyle = '#EEEDEA'; c.lineWidth = 0.5;
  for(let r=1; r<6; r++){
    const y = gridTop + r*rowH;
    c.beginPath(); c.moveTo(pad, y); c.lineTo(w-pad, y); c.stroke();
  }
  for(let col=1; col<7; col++){
    const x = pad + col*colW;
    c.beginPath(); c.moveTo(x, gridTop); c.lineTo(x, gridTop+gridH); c.stroke();
  }

  // Day numbers
  const numSize = Math.max(7, Math.round(rowH * 0.22));
  c.font = `400 ${numSize}px system-ui, sans-serif`;
  c.textAlign = 'center'; c.textBaseline = 'top';

  if(year !== null && month !== null){
    const firstDay = new Date(year, month, 1);
    const startCol = (firstDay.getDay() + 6) % 7; // Mon=0 … Sun=6
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    let day = 1;
    for(let row=0; row<6; row++){
      for(let col=0; col<7; col++){
        const cellIdx = row*7 + col;
        if(cellIdx < startCol || day > daysInMonth) continue;
        const x = pad + col*colW + colW/2;
        const y = gridTop + row*rowH + 4;
        c.fillStyle = col >= 5 ? '#C8A0A0' : '#555452';
        c.fillText(String(day), x, y);
        day++;
      }
    }
  } else {
    // No date selected — show faint placeholder dots
    for(let row=0; row<6; row++){
      for(let col=0; col<7; col++){
        const x = pad + col*colW + colW/2;
        const y = gridTop + row*rowH + rowH/2;
        c.fillStyle = '#E4E3DF';
        c.beginPath();
        c.arc(x, y, Math.max(1.5, numSize*0.25), 0, Math.PI*2);
        c.fill();
      }
    }
  }

  // Bottom memo lines
  const memoY = gridTop + gridH + 4;
  const memoH = h - memoY - 6;
  if(memoH > 20){
    c.strokeStyle = '#E8E7E3'; c.lineWidth = 0.4;
    const lineSpacing = memoH / Math.max(2, Math.floor(memoH/18));
    for(let y=memoY; y<h-4; y+=lineSpacing){
      c.beginPath(); c.moveTo(pad, y); c.lineTo(w-pad, y); c.stroke();
    }
  }
}

// ─── STROKE DRAWING ─────────────────────────────
function drawStroke(c, stroke, w, h){
  const pts = stroke.points; if(!pts||pts.length<1) return;
  c.save();
  const sz = DRAW_SIZES[stroke.sizeIdx??1];
  let lw, color, alpha;
  if(stroke.tool==='highlighter'){ lw=(sz?.h??14)*(w/760); color=DRAW_COLORS[stroke.colorIdx??0]; alpha=0.35; }
  else if(stroke.tool==='eraser'){ lw=(sz?.e??22)*(w/760); color='#FFFFFF'; alpha=1; }
  else{ lw=(sz?.p??3.5)*(w/760); color=DRAW_COLORS[stroke.colorIdx??0]; alpha=1; }
  c.strokeStyle=color; c.fillStyle=color;
  c.lineWidth=lw; c.globalAlpha=alpha; c.lineCap='round'; c.lineJoin='round';
  if(pts.length===1){
    c.beginPath(); c.arc(pts[0][0]*w,pts[0][1]*h,lw/2,0,Math.PI*2); c.fill();
  } else {
    c.beginPath(); c.moveTo(pts[0][0]*w,pts[0][1]*h);
    for(let i=1;i<pts.length-1;i++){
      const mx=(pts[i][0]+pts[i+1][0])/2*w, my=(pts[i][1]+pts[i+1][1])/2*h;
      c.quadraticCurveTo(pts[i][0]*w,pts[i][1]*h,mx,my);
    }
    c.lineTo(pts[pts.length-1][0]*w,pts[pts.length-1][1]*h); c.stroke();
  }
  c.restore();
}

// ─── POINTER EVENTS ─────────────────────────────
function bindEvents(){
  if(!canvasEl) return;
  ['pointerdown','pointermove','pointerup','pointerleave','pointercancel'].forEach(ev=>canvasEl.removeEventListener(ev,handlers[ev]));
  ['pointerdown','pointermove','pointerup','pointerleave','pointercancel'].forEach(ev=>canvasEl.addEventListener(ev,handlers[ev]));
}
const handlers = {
  pointerdown(e){ e.preventDefault(); canvasEl.setPointerCapture(e.pointerId); const {nx,ny}=getCoords(e); if(ny<HEADER_RATIO) return; const _nb=getNotebook(state.notebookId); const _pg=_nb&&_nb.pages[state.pageIdx]; if(_pg&&isPageLocked(_pg)){ showToast('프리미엄 구독 시 이용 가능한 페이지입니다.'); return; } if(_pg&&!_pg.date){ showNoDateAlert(); return; } isDrawing=true; currentStroke={tool:draw.tool,colorIdx:draw.colorIdx,sizeIdx:draw.sizeIdx,points:[[nx,ny]]}; },
  pointermove(e){ if(!isDrawing||!currentStroke) return; e.preventDefault(); const {nx,ny}=getCoords(e); if(ny<HEADER_RATIO) return; currentStroke.points.push([nx,ny]); redrawCanvas(); drawStroke(ctx,currentStroke,canvasEl._cssW,canvasEl._cssH); },
  pointerup(e){ if(!isDrawing||!currentStroke) return; isDrawing=false; const nb=getNotebook(state.notebookId); const pg=nb&&nb.pages[state.pageIdx]; if(pg&&currentStroke.points.length>0) pushPageStroke(pg,currentStroke); currentStroke=null; saveData(); drawThumbnail(state.pageIdx); },
  pointerleave(e){ handlers.pointerup(e); },
  pointercancel(e){ handlers.pointerup(e); }
};
function getCoords(e){ const r=canvasEl.getBoundingClientRect(); return{nx:(e.clientX-r.left)/canvasEl._cssW,ny:(e.clientY-r.top)/canvasEl._cssH}; }

function showNoDateAlert(){
  if(document.getElementById('no-date-alert')) return;
  const overlay = document.createElement('div');
  overlay.id = 'no-date-alert';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:10000;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:16px;padding:24px 22px 18px;max-width:280px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <h3 style="margin:0 0 8px;font-size:15px;font-weight:700;color:#1A1918;">날짜를 먼저 설정해주세요</h3>
      <p style="margin:0 0 20px;font-size:13px;color:#6B6A68;line-height:1.6;">이 페이지에 날짜를 지정한 뒤<br>필기를 시작할 수 있어요.</p>
      <div style="display:flex;gap:8px;">
        <button onclick="document.getElementById('no-date-alert').remove()" style="flex:1;padding:11px;border:1px solid #E4E3DF;border-radius:9px;background:#fff;font-family:inherit;font-size:13px;color:#888785;cursor:pointer;">닫기</button>
        <button onclick="document.getElementById('no-date-alert').remove();toggleDatePopup();" style="flex:2;padding:11px;border:none;border-radius:9px;background:#18171A;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">날짜 설정하기</button>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function undoDraw(){
  const nb=getNotebook(state.notebookId); if(!nb) return;
  const pg=nb.pages[state.pageIdx]; if(!pg||!getPageStrokes(pg).length) return;
  popPageStroke(pg); saveData(); redrawCanvas(); drawThumbnail(state.pageIdx);
}
function clearDraw(){
  if(!confirm('이 페이지의 내용을 모두 지울까요?')) return;
  const nb=getNotebook(state.notebookId); if(!nb) return;
  const pg=nb.pages[state.pageIdx]; if(!pg) return;
  clearPageStrokes(pg); saveData(); redrawCanvas(); drawThumbnail(state.pageIdx);
}

// ─── TIMER ──────────────────────────────────────
function currentElapsed(){ return state.timer.running ? state.timer.savedTime+(Date.now()-state.timer.startTime)/1000 : state.timer.savedTime; }
function updateTimerUI(){
  const t=document.getElementById('pui-timer'); if(t) t.textContent=fmtTime(currentElapsed());
  const b=document.getElementById('pui-play');
  if(b){ b.textContent=state.timer.running?'⏸':'▶'; b.classList.toggle('playing',state.timer.running); }
  const tt=document.getElementById('pui-timer');
  if(tt) tt.classList.toggle('running',state.timer.running);
}
function toggleTimer(){
  if(!state.timer.running){
    const nb = getNotebook(state.notebookId);
    const pg = nb && nb.pages[state.pageIdx];
    const today = getTodayIso();
    // 날짜 기반 비교: daily는 YYYY-MM-DD, weekly는 오늘이 속한 주, monthly는 이번 달
    if(nb && pg){
      let isToday = false;
      if(nb.type === 'daily')   isToday = pg.date === today;
      else if(nb.type === 'weekly') isToday = pg.date === getISOWeek(new Date(today));
      else if(nb.type === 'monthly') isToday = pg.date === today.slice(0,7);
      else isToday = false; // 날짜 없는 페이지는 공부 기록 불가
      if(!isToday){
        showTimerBlockToast(!pg.date);
        return;
      }
    }
  }
  state.timer.running ? pauseTimer() : startTimer();
}
function showTimerBlockToast(noDate=false){
  // 기존 팝업 제거
  const existing = document.getElementById('timer-block-modal');
  if(existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'timer-block-modal';
  modal.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;background:rgba(0,0,0,0.35);';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:24px 24px 18px;width:260px;box-shadow:0 8px 40px rgba(0,0,0,0.18);text-align:center;">
      <div style="width:40px;height:40px;border-radius:50%;background:#FFF3CD;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:20px;">⏱️</div>
      <p style="margin:0 0 6px;font-size:13.5px;font-weight:700;color:#18171A;">공부 기록 불가</p>
      <p style="margin:0 0 18px;font-size:12px;color:#888785;line-height:1.5;">${noDate ? '날짜를 설정한 후<br>공부 기록을 시작할 수 있어요' : '공부 기록은 오늘 날짜의<br>플래너에서만 가능해요'}</p>
      <button onclick="document.getElementById('timer-block-modal').remove()" style="width:100%;padding:10px 0;border:none;border-radius:8px;background:#18171A;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">확인</button>
    </div>`;
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}
function startTimer(){ state.timer.running=true; state.timer.startTime=Date.now(); state.timer.interval=setInterval(updateTimerUI,1000); updateTimerUI(); }
function pauseTimer(){ if(!state.timer.running) return; state.timer.savedTime+=(Date.now()-state.timer.startTime)/1000; state.timer.running=false; clearInterval(state.timer.interval); saveTimerToPage(); updateTimerUI(); }
function stopTimer(save){ if(state.timer.running){state.timer.savedTime+=(Date.now()-state.timer.startTime)/1000; state.timer.running=false; clearInterval(state.timer.interval);} if(save) saveTimerToPage(); }
function resetTimer(){ stopTimer(false); state.timer.savedTime=0; saveTimerToPage(); updateTimerUI(); }
function saveTimerToPage(){ const nb=getNotebook(state.notebookId); if(!nb) return; const pg=nb.pages[state.pageIdx]; if(!pg||!pg.date) return; db.studyRecords[pg.date]=Math.floor(state.timer.savedTime); saveData(); }

// ─── DATE ───────────────────────────────────────
function autoFlushTrappedPages(nb){
  // 연속된 날짜 사이에 끼인 날짜 없는 페이지들을 자동으로 맨 뒤로 이동
  let changed = true;
  while(changed){
    changed = false;
    for(let i = 0; i < nb.pages.length; i++){
      if(nb.pages[i].date) continue; // 날짜 있는 페이지는 패스
      // 앞쪽 가장 가까운 날짜 / 뒤쪽 가장 가까운 날짜 찾기
      let prevDate = null, nextDate = null;
      for(let j = i-1; j >= 0; j--){ if(nb.pages[j].date){ prevDate = nb.pages[j].date; break; } }
      for(let j = i+1; j < nb.pages.length; j++){ if(nb.pages[j].date){ nextDate = nb.pages[j].date; break; } }
      if(!prevDate || !nextDate) continue; // 한쪽만 있으면 패스
      const diff = Math.floor((new Date(nextDate) - new Date(prevDate)) / (1000*60*60*24));
      if(diff <= 1){
        // 끼인 페이지 뒤로 이동
        const [pg] = nb.pages.splice(i, 1);
        nb.pages.push(pg);
        if(state.pageIdx === i) state.pageIdx = Math.max(0, i - 1);
        else if(state.pageIdx > i) state.pageIdx--;
        if(openTabs[activeTabIdx]) openTabs[activeTabIdx].pageIdx = state.pageIdx;
        changed = true;
        break; // 인덱스가 바뀌었으니 처음부터 다시
      }
    }
  }
}

function setPageDate(val){
  const nb=getNotebook(state.notebookId); if(!nb) return;
  const pg=nb.pages[state.pageIdx]; if(!pg) return;
  pg.date = val||null; saveData();
  // 날짜 변경 시 timer.savedTime을 해당 날짜의 실제 기록과 동기화 (안하면 이후 페이지 이동 시 0으로 덮어씀)
  state.timer.savedTime = val ? (db.studyRecords[val]||0) : 0;
  // 연속 날짜 사이에 끼인 날짜 없는 페이지 자동 정리
  autoFlushTrappedPages(nb);
  saveData();
  const dateText=document.getElementById('pui-date-text');
  if(dateText) dateText.textContent = val ? fmtDateForDisplay(val, nb.type) : '날짜 설정';
  const clearBtn=document.getElementById('pui-date-clear');
  if(clearBtn) clearBtn.style.display = val ? 'inline-block' : 'none';
  const dateBtn=document.querySelector('.pui-date-btn');
  if(dateBtn) dateBtn.classList.remove('locked');
  renderSidebarPages();
  redrawCanvas();
}

function clearPageDate(){
  const nb = getNotebook(state.notebookId), pg = nb&&nb.pages[state.pageIdx];
  if(isDateLocked(pg, nb)) return;
  setPageDate('');
  closeDatePopup();
  showToast('날짜가 해제되었어요. 정렬 시 목록 아래로 이동해요.');
}
function selectTodayDate(){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  const today = getTodayIso();
  let val;
  if(nb.type === 'weekly'){
    val = getISOWeek(new Date(today));
  } else if(nb.type === 'monthly'){
    val = today.slice(0,7);
  } else {
    val = today;
  }
  const used = getUsedDates();
  if(used.has(val)) return; // 이미 다른 페이지에서 사용 중 — 캘린더에서 비활성 처리됨
  tryChangeDate(val);
}

// ─── MONTHLY STATS ──────────────────────────────
let statsState = { year: new Date().getFullYear(), month: new Date().getMonth()+1 };

function showMonthlyStats(){
  const t = new Date();
  statsState.year = t.getFullYear(); statsState.month = t.getMonth()+1;
  renderMonthlyStats();
  const el = document.getElementById('monthly-stats-overlay');
  el.style.display = 'flex';
}
function closeMonthlyStats(){ document.getElementById('monthly-stats-overlay').style.display = 'none'; }
function prevStatsMonth(){ if(statsState.month===1){statsState.month=12;statsState.year--;} else statsState.month--; renderMonthlyStats(); }
function nextStatsMonth(){ if(statsState.month===12){statsState.month=1;statsState.year++;} else statsState.month++; renderMonthlyStats(); }

function renderMonthlyStats(){
  const {year, month} = statsState;
  const today = getTodayIso();
  const prefix = `${year}-${String(month).padStart(2,'0')}`;
  const daysInMonth = new Date(year, month, 0).getDate();

  // 날짜별 공부 시간 집계 (studyRecords에서 직접)
  const timeByDate = {};
  Object.entries(db.studyRecords||{}).forEach(([date,secs])=>{
    if(date.startsWith(prefix)) timeByDate[date] = secs;
  });

  const dayNames = ['일','월','화','수','목','금','토'];
  let rows = ''; let total = 0;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${prefix}-${String(d).padStart(2,'0')}`;
    const secs = timeByDate[dateStr]||0;
    total += secs;
    const isToday = dateStr === today;
    const dow = new Date(year, month-1, d).getDay();
    const isSun = dow===0, isSat = dow===6;
    const dayColor = isToday ? '#18171A' : isSun ? '#E05555' : isSat ? '#5577DD' : '#555452';
    const timeColor = secs > 0 ? '#18171A' : '#D0CFCC';
    const bg = isToday ? '#F5F4F1' : 'transparent';
    rows += `<div style="display:flex;align-items:center;padding:5px 18px;background:${bg};gap:0;">
      <span style="width:28px;font-size:11px;font-weight:${isToday?'700':'400'};color:${dayColor};flex-shrink:0;">${d}일</span>
      <span style="width:20px;font-size:10px;color:${dayColor};opacity:0.5;flex-shrink:0;">${dayNames[dow]}</span>
      <span style="flex:1;font-size:12px;font-weight:${secs>0?'600':'400'};color:${timeColor};text-align:right;font-variant-numeric:tabular-nums;">${fmtTime(secs)}</span>
    </div>`;
  }

  document.getElementById('stats-month-label').textContent = `${year}년 ${month}월`;
  document.getElementById('monthly-stats-content').innerHTML = rows;
  document.getElementById('stats-total').textContent = total>0 ? fmtTime(total) : '00:00';
}

// ─── CLOSE POPUPS ON OUTSIDE CLICK ─────────────
// ─── CANVAS AREA SCROLL PAGE NAVIGATION ─────────
let _scrollNavCooldown = false;
document.addEventListener('wheel', e=>{
  const area = document.getElementById('gn-canvas-area');
  if(!area || !area.contains(e.target)) return;
  if(_scrollNavCooldown) return;
  const nb = getNotebook(state.notebookId); if(!nb) return;

  const atTop    = area.scrollTop <= 0;
  const atBottom = area.scrollTop + area.clientHeight >= area.scrollHeight - 2;

  if(e.deltaY > 0 && atBottom && state.pageIdx < nb.pages.length - 1){
    e.preventDefault();
    _scrollNavCooldown = true;
    switchPage(state.pageIdx + 1);
    setTimeout(()=>{ _scrollNavCooldown = false; }, 600);
  } else if(e.deltaY < 0 && atTop && state.pageIdx > 0){
    e.preventDefault();
    _scrollNavCooldown = true;
    switchPage(state.pageIdx - 1);
    setTimeout(()=>{ _scrollNavCooldown = false; }, 600);
  }
}, { passive: false });

document.addEventListener('click', e=>{
  const popup = document.getElementById('pui-date-popup');
  if(popup && popup.classList.contains('show') && !popup.contains(e.target)){
    const dateBtn = e.target.closest('.pui-date-btn');
    if(!dateBtn) closeDatePopup();
  }
  const sbPopup = document.getElementById('sb-page-dp');
  if(sbPopup && sbPopup.style.display !== 'none' && !sbPopup.contains(e.target)){
    if(!e.target.closest('.gn-page-date-btn')) closeSbPageDatePicker();
  }
});

// ─── KEYBOARD ───────────────────────────────────
document.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&state.view==='page'){ e.preventDefault(); undoDraw(); }
  if(e.key==='Escape'){
    if(document.getElementById('purchase-modal').classList.contains('show')) closePurchaseModal();
    else if(document.getElementById('rename-modal').classList.contains('show')) closeRenameModal();
  }
});

// ─── INIT ───────────────────────────────────────
render();
renderTabBar();
</script>
