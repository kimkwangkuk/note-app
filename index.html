<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>note</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F3F2EE; --surface: #FFF; --surface-2: #F8F7F4;
  --border: #E4E3DF; --text-1: #18171A; --text-2: #6B6A68; --text-3: #AEADAB;
  --radius: 14px; --radius-sm: 9px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow: 0 2px 10px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.05);
  --tab-h: 42px;
}
body { font-family: -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',system-ui,sans-serif; background: var(--bg); color: var(--text-1); min-height: 100vh; -webkit-font-smoothing: antialiased; }
body.drawing-mode { overflow: hidden; }
body.drawing-mode #app { display: none; }

/* ── TAB BAR ── */
#tab-bar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--tab-h);
  background: #1C1C1C;
  display: flex; align-items: flex-end;
  z-index: 300;
  border-bottom: 1px solid rgba(0,0,0,0.4);
  user-select: none;
}
.tb-logo {
  font-size: 14px; font-weight: 700; letter-spacing: -0.5px;
  color: rgba(255,255,255,0.55); padding: 0 16px;
  height: 100%; display: flex; align-items: center;
  cursor: pointer; flex-shrink: 0;
  transition: color .15s;
}
.tb-logo:hover { color: rgba(255,255,255,0.9); }
#tb-tabs {
  flex: 1; display: flex; align-items: flex-end; min-width: 0;
  overflow-x: auto; overflow-y: hidden; gap: 2px;
  scrollbar-width: none; padding: 0 2px;
}
#tb-tabs::-webkit-scrollbar { display: none; }
.nb-tab {
  flex: 1 1 auto; min-width: 96px; max-width: 200px; height: 34px;
  background: #2A2A2A; border: 1px solid rgba(255,255,255,0.07);
  border-bottom: none; border-radius: 8px 8px 0 0;
  display: flex; align-items: center; padding: 0 8px 0 10px;
  cursor: pointer; gap: 6px; overflow: hidden;
  transition: background .12s; position: relative; flex-shrink: 0;
}
.nb-tab:hover { background: #333; }
.nb-tab.active {
  background: var(--bg); border-color: rgba(0,0,0,0.08);
  z-index: 1;
}
.nb-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--bg);
}
.tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab-name { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(255,255,255,0.5); }
.nb-tab.active .tab-name { color: var(--text-1); }
.tab-x {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; opacity: 0; transition: opacity .12s, background .12s;
  color: rgba(255,255,255,0.45); font-size: 10px;
}
.nb-tab:hover .tab-x, .nb-tab.active .tab-x { opacity: 1; }
.nb-tab.active .tab-x { color: rgba(0,0,0,0.4); }
.tab-x:hover { background: rgba(0,0,0,0.1) !important; }
.nb-tab:not(.active) .tab-x:hover { background: rgba(255,255,255,0.12) !important; color: rgba(255,255,255,0.85); }
.tb-store-btn {
  flex-shrink: 0; height: 26px; padding: 0 13px;
  border-radius: 6px; border: none;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
  cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
  margin: auto 10px 7px 8px; transition: all .15s;
}
.tb-store-btn:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }
.tb-store-btn.active { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
.tb-premium-btn { flex-shrink:0; height:26px; padding:0 11px; border-radius:6px; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; margin:auto 6px 7px 0; transition:all .15s; }
.tb-premium-btn.on  { background:rgba(255,200,60,0.18); color:#FFD040; }
.tb-premium-btn.off { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.35); }
.gn-thumb-img-wrap { position:relative; flex-shrink:0; width:70px; }
.gn-lock-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.52); display:flex; align-items:center; justify-content:center; pointer-events:none; }
.gn-lock-overlay svg { opacity:0.85; }

/* ── LAYOUT ── */
#app { padding-top: var(--tab-h); max-width: 920px; margin: 0 auto; padding-left: 28px; padding-right: 28px; padding-bottom: 80px; }
.view { animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.ph { padding: 40px 0 24px; display: flex; align-items: flex-end; justify-content: space-between; }
.ph-title { font-size: 26px; font-weight: 700; letter-spacing: -0.7px; }
.ph-sub { font-size: 13.5px; color: var(--text-2); margin-top: 4px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .15s; user-select: none; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--text-1); color: #fff; }
.btn-primary:hover { background: #2c2b2e; }
.btn-ghost { background: none; color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); color: var(--text-1); }
.btn-sm { padding: 6px 13px; font-size: 13px; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 80px 0; color: var(--text-3); }
.empty-icon { font-size: 36px; margin-bottom: 14px; opacity: .5; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.empty-sub { font-size: 14px; }

/* ── NOTEBOOK GRID ── */
.nb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(188px,1fr)); gap: 16px; }
.nb-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; transition: transform .18s, box-shadow .18s; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.05); }
.nb-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.nb-cover { height: 148px; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 16px; cursor: pointer; }
.nb-cover::after { content:''; position: absolute; inset: 0; background: repeating-linear-gradient(transparent,transparent 18px,rgba(255,255,255,0.07) 19px); pointer-events: none; }
.nb-cover-name { position: relative; z-index: 1; color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.3; word-break: break-word; }
.nb-info { padding: 12px 14px 14px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.nb-info-name { font-size: 13px; font-weight: 600; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.nb-rename-btn {
  width: 28px; height: 28px; border-radius: 6px; border: none; background: none;
  color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0; opacity: 0;
}
.nb-card:hover .nb-rename-btn { opacity: 1; }
.nb-rename-btn:hover { background: var(--surface-2); color: var(--text-1); }

/* ── STORE ── */
.store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(268px,1fr)); gap: 20px; }
.store-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: transform .18s, box-shadow .18s; }
.store-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.store-preview { height: 180px; background: var(--surface-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 20px; }
.store-body { padding: 18px 20px 20px; }
.store-type { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
.store-name { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
.store-desc-short { font-size: 13.5px; color: var(--text-2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.store-notice { margin-top: 20px; padding: 10px 14px; border-radius: var(--radius-sm); background: var(--surface-2); border: 1px solid var(--border); font-size: 12.5px; color: var(--text-2); line-height: 1.5; }

/* ── STORE DETAIL ── */
.sd-wrap { display: grid; grid-template-columns: 1fr 340px; gap: 40px; align-items: start; }
@media (max-width: 720px) { .sd-wrap { grid-template-columns: 1fr; } }
.sd-preview-area { background: var(--surface-2); border-radius: var(--radius); border: 1px solid var(--border); height: 400px; display: flex; align-items: center; justify-content: center; }
.sd-type { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
.sd-name { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 14px; }
.sd-desc { font-size: 15px; color: var(--text-2); line-height: 1.7; margin-bottom: 28px; }
.sd-feat-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-3); margin-bottom: 10px; }
.sd-feat-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; color: var(--text-2); }
.sd-feat-item:last-child { border-bottom: none; }
.sd-feat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
.sd-divider { height: 1px; background: var(--border); margin: 24px 0; }
.sd-add-hint { font-size: 12.5px; color: var(--text-3); margin-bottom: 16px; line-height: 1.5; }
.back-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; box-shadow: var(--shadow-sm); }
.back-btn:hover { background: var(--bg); }

/* page preview CSS */
.page-preview { width: 120px; height: 152px; background: #fff; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); overflow: hidden; flex-shrink: 0; }
.pp-header { height: 28px; display: flex; align-items: center; padding: 0 8px; border-bottom: 1px solid #eee; gap: 4px; }
.pp-dot { height: 4px; border-radius: 3px; }
.pp-lines { padding: 6px 8px; }
.pp-line { height: 2px; border-radius: 2px; background: #F0EFF0; margin-bottom: 5px; }
.pp-line.d { background: #E0DFE0; }
.pp-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 6px 8px; }
.pp-cell { height: 16px; border-radius: 3px; background: #F4F3F0; }
.pp-cell.h { background: #E8E6F0; }
.pp-row { padding: 4px 8px; border-bottom: 1px solid #F0EFF0; display: flex; gap: 4px; align-items: center; }
.pp-tag { width: 28px; height: 6px; border-radius: 3px; background: #E0DFE8; flex-shrink: 0; }
.pp-bar { flex: 1; height: 6px; border-radius: 3px; background: #F0EFF4; }
.pp-bar.f { background: #C8C5D8; }
.page-preview-lg { width: 200px; height: 267px; background: #fff; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; }
.page-preview-lg .pp-header { height: 44px; padding: 0 14px; }
.page-preview-lg .pp-lines { padding: 10px 14px; }
.page-preview-lg .pp-line { height: 3px; margin-bottom: 8px; }
.page-preview-lg .pp-cols { padding: 10px 14px; gap: 6px; }
.page-preview-lg .pp-cell { height: 24px; }
.page-preview-lg .pp-row { padding: 7px 14px; }
.page-preview-lg .pp-tag { width: 40px; height: 8px; }
.page-preview-lg .pp-bar { height: 8px; }

/* ── PURCHASE MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 500; display: none; }
.modal-overlay.show { display: flex; align-items: center; justify-content: center; animation: fadeIn .18s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal { background: var(--surface); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 400px; margin: 20px; box-shadow: var(--shadow-lg); animation: modalIn .2s ease; }
@keyframes modalIn { from{opacity:0;transform:scale(0.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 4px; }
.modal-sub { font-size: 14px; color: var(--text-2); margin-bottom: 20px; }
.modal-input { width: 100%; padding: 11px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-family: inherit; font-size: 15px; outline: none; color: var(--text-1); background: var(--surface-2); transition: border-color .15s; margin-bottom: 18px; }
.modal-input:focus { border-color: var(--text-1); background: #fff; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; justify-content: center; }
.pm-qty-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.pm-qty-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; background: none; cursor: pointer; font-family: inherit; text-align: center; transition: all .15s; }
.pm-qty-btn:hover { border-color: var(--text-1); }
.pm-qty-btn.selected { border-color: var(--text-1); background: var(--text-1); color: #fff; }
.pm-qty-btn.disabled { opacity: 0.28; cursor: not-allowed; pointer-events: none; }
.pm-qty-btn .qb-pages { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; display: block; margin-bottom: 2px; }
.pm-qty-btn .qb-price { font-size: 11.5px; font-weight: 500; opacity: .65; }
.pm-hint { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.pm-hint::before { content: '✓'; font-size: 10px; }
.pm-total { font-size: 15px; font-weight: 700; color: var(--text-1); margin-top: 12px; }
.pm-premium-banner { display:none; align-items:center; gap:8px; background:rgba(255,200,60,0.13); border:1.5px solid rgba(255,208,64,0.35); border-radius:10px; padding:10px 14px; margin-bottom:16px; color:#FFD040; font-size:13px; font-weight:600; }
.pm-premium-banner.show { display:flex; }
.pm-premium-banner svg { flex-shrink:0; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--text-1); color: #fff; padding: 12px 20px; border-radius: 99px; font-size: 14px; font-weight: 500; z-index: 600; display: none; white-space: nowrap; box-shadow: 0 8px 30px rgba(0,0,0,0.25); pointer-events: none; }
.toast.show { display: block; animation: toastIn .2s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ════════════════════════════════════════
   DRAWING MODE
════════════════════════════════════════ */
.gn-layout { position: fixed; inset: var(--tab-h) 0 0 0; display: flex; z-index: 250; background: #4A4A4A; }

/* ── Sidebar ── */
.gn-sidebar { width: 210px; flex-shrink: 0; background: #1A1A1A; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); transition: width .25s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
.gn-sidebar.collapsed { width: 0; }
.gn-sb-inner { width: 210px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.gn-sb-head { padding: 14px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background .15s; }
.gn-sb-head:hover { background: rgba(255,255,255,0.04); }
.gn-sb-head svg { flex-shrink: 0; opacity: 0.4; transition: opacity .15s; }
.gn-sb-head:hover svg { opacity: 0.7; }
.gn-sb-nb-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gn-pages-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.gn-pages-list::-webkit-scrollbar { width: 3px; }
.gn-pages-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
.gn-page-thumb-wrap { cursor: pointer; border-radius: 7px; overflow: hidden; border: 2px solid transparent; transition: border-color .15s; flex-shrink: 0; display:flex; align-items:stretch; }
.gn-page-thumb-wrap:hover { border-color: rgba(255,255,255,0.18); }
.gn-page-thumb-wrap.active { border-color: #5B9CF6; }
.gn-thumb-canvas { display: block; width: 100%; }
.gn-thumb-label { background: #232323; padding: 8px 7px 7px; display: flex; flex-direction:column; align-items:stretch; justify-content:space-between; gap: 6px; flex:1; min-width:0; }
.gn-thumb-num { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); flex-shrink: 0; }
.gn-page-date-btn { width:100%; display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.07); border:none; border-radius:5px; padding:5px 6px; cursor:pointer; font-family:inherit; font-size:10px; color:rgba(255,255,255,0.38); transition:all .12s; text-align:left; min-width:0; }
.gn-page-date-btn:hover { background:rgba(255,255,255,0.13); color:rgba(255,255,255,0.85); }
.gn-page-date-btn.has-date { color:rgba(255,255,255,0.68); }
.gn-page-date-btn .gn-date-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gn-sb-footer { padding: 12px 10px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.gn-add-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px dashed rgba(255,255,255,0.15); background: none; cursor: pointer; font-family: inherit; font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
.gn-add-btn:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.04); }
.gn-add-line { display: flex; align-items: center; justify-content: center; padding: 6px 10px; flex-shrink: 0; }
.gn-add-line-inner { display: flex; align-items: center; gap: 5px; width: 100%; border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; padding: 5px 0; justify-content: center; color: rgba(255,255,255,0.35); font-size: 10.5px; font-weight: 600; font-family: inherit; background: none; cursor: pointer; transition: all .15s; }
.gn-add-line-inner:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.75); }

/* ── Sidebar Calendar Popup ── */
.scal-overlay { position:fixed; inset:0; z-index:800; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; }
.scal-overlay.show { display:flex; }
.scal-popup { background:#1E1D22; border-radius:16px; padding:18px 16px 16px; width:280px; box-shadow:0 12px 48px rgba(0,0,0,0.5); }
.scal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.scal-title { font-size:13px; font-weight:700; color:rgba(255,255,255,0.75); }
.scal-nav { width:24px; height:24px; border:none; background:none; cursor:pointer; color:rgba(255,255,255,0.35); font-size:16px; line-height:1; border-radius:5px; display:flex; align-items:center; justify-content:center; transition:all .12s; font-family:inherit; padding:0; }
.scal-nav:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.75); }
.scal-days-hdr { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:2px; }
.scal-day-name { text-align:center; font-size:9px; font-weight:600; color:rgba(255,255,255,0.22); padding:0 0 4px; }
.scal-row { display:grid; grid-template-columns:repeat(7,1fr); }
.scal-day { display:flex; flex-direction:column; align-items:center; gap:2px; padding:3px 0; cursor:pointer; }
.scal-day.scal-taken { cursor:default; }
.scal-num { font-size:11px; color:rgba(255,255,255,0.5); width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .1s; }
.scal-day:not(.scal-taken):hover .scal-num { background:rgba(255,255,255,0.1); }
.scal-day.scal-other .scal-num { color:rgba(255,255,255,0.15); }
.scal-day.scal-sat .scal-num { color:rgba(91,156,246,0.6); }
.scal-day.scal-sun .scal-num { color:rgba(200,91,91,0.6); }
.scal-day.scal-today .scal-num { outline:1.5px solid rgba(255,255,255,0.4); color:rgba(255,255,255,0.85); font-weight:700; }
.scal-day.scal-range-start .scal-num, .scal-day.scal-range-end .scal-num { background:#5B9CF6 !important; color:#fff !important; font-weight:700; outline:none; }
.scal-day.scal-in-range .scal-num { background:rgba(91,156,246,0.28); color:rgba(255,255,255,0.9); border-radius:50%; }
.scal-day.scal-hover-range .scal-num { background:rgba(91,156,246,0.14); color:rgba(255,255,255,0.7); border-radius:50%; }
.scal-day.scal-taken .scal-num { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); }
.scal-dot { width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.25); }
.scal-dot.dot-range { background:#5B9CF6; }
.scal-dot-ph { width:4px; height:4px; }
.scal-footer { margin-top:14px; display:flex; align-items:center; gap:8px; }
.scal-confirm-btn { flex:1; padding:11px 0; border:none; border-radius:10px; background:#5B9CF6; color:#fff; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:opacity .15s; }
.scal-confirm-btn:disabled { opacity:0.3; cursor:not-allowed; }
.scal-cancel-btn { padding:11px 16px; border:none; border-radius:10px; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.scal-cancel-btn:hover { background:rgba(255,255,255,0.14); }

/* ── Main ── */
.gn-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* ── Toolbar ── */
.gn-toolbar { height: 48px; background: #141414; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; padding: 0 10px; gap: 3px; flex-shrink: 0; }
.tb-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 5px; flex-shrink: 0; }
.tb-spacer { flex: 1; }
.tb-icon-btn { width: 34px; height: 34px; border-radius: 7px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.45); transition: background .12s, color .12s; flex-shrink: 0; }
.tb-icon-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
.tb-tool-btn { height: 30px; padding: 0 10px; border-radius: 7px; border: none; background: rgba(255,255,255,0.06); cursor: pointer; display: flex; align-items: center; gap: 5px; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; font-family: inherit; transition: all .12s; flex-shrink: 0; }
.tb-tool-btn:hover { background: rgba(255,255,255,0.11); color: rgba(255,255,255,0.8); }
.tb-tool-btn.active { background: rgba(255,255,255,0.16); color: #fff; }
.tb-tool-ico { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.color-dot { width: 19px; height: 19px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all .12s; flex-shrink: 0; }
.color-dot:hover { transform: scale(1.2); }
.color-dot.active { border-color: #fff; }
.size-btn { height: 28px; padding: 0 8px; border-radius: 6px; border: none; background: rgba(255,255,255,0.06); cursor: pointer; color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 700; font-family: inherit; transition: all .12s; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.size-btn:hover { background: rgba(255,255,255,0.11); color: rgba(255,255,255,0.8); }
.size-btn.active { background: rgba(255,255,255,0.16); color: #fff; }
.size-dot { border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* ── Canvas area ── */
.gn-canvas-area { flex: 1; overflow: auto; background: #505050; display: flex; align-items: flex-start; justify-content: center; padding: 28px; }
.gn-canvas-area::-webkit-scrollbar { width: 6px; height: 6px; }
.gn-canvas-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
.canvas-wrapper { position: relative; line-height: 0; box-shadow: 0 8px 52px rgba(0,0,0,0.5); flex-shrink: 0; }
#draw-canvas { display: block; cursor: crosshair; touch-action: none; }
.canvas-lock-overlay { display:none; position:absolute; inset:0; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); background:rgba(30,28,35,0.18); z-index:10; pointer-events:none; }
.canvas-lock-overlay.show { display:block; }
.page-locked-float { display:none; position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:20; }
.page-locked-float.show { display:flex; }
.page-locked-float-btn { display:flex; align-items:center; gap:7px; padding:10px 20px; background:rgba(28,26,33,0.88); border:1.5px solid rgba(255,208,64,0.35); border-radius:99px; color:#FFD040; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.35); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); white-space:nowrap; }
.page-locked-float-btn svg { flex-shrink:0; }

/* Paper UI overlay */
.paper-ui { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; display: flex; align-items: center; padding: 0 20px; gap: 10px; }
.pui-left { pointer-events: auto; display: flex; align-items: center; gap: 7px; }
.pui-date-btn { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; color: #9A9997; letter-spacing: 0; padding: 0; line-height: 1; transition: color .15s; display: flex; align-items: center; gap: 4px; }
.pui-date-btn:hover { color: #1A1918; }
.pui-date-btn svg { opacity: 0.32; transition: opacity .15s; }
.pui-date-btn:hover svg { opacity: 0.65; }
.pui-date-btn.locked { cursor: default; }
.pui-date-btn.locked:hover { color: #9A9997; }
.pui-date-btn.locked:hover svg { opacity: 0.32; }
#pui-date-input { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; top: 0; left: 0; }
/* Date popover */
.pui-date-popup {
  position: absolute; top: calc(100% + 6px); left: 16px;
  background: #fff; border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.08);
  padding: 14px 14px 12px; display: none; z-index: 20;
  pointer-events: auto; min-width: 252px; overflow: hidden;
}
.pui-date-popup.show { display: block; animation: fadeIn .12s ease; }
.pui-dp-label {
  font-size: 10px; font-weight: 600; color: #B0AFAC;
  letter-spacing: 0.4px; text-transform: uppercase;
  margin-bottom: 10px; display: block;
}
.pui-dp-label span { font-size: 10px; font-weight: 400; color: #C8C7C4; }
/* native date input (daily) */
.pui-dp-input { width: 100%; padding: 6px 8px; border: 1px solid #E4E3DF; border-radius: 7px; font-family: inherit; font-size: 12px; color: #18171A; outline: none; background: #FAFAF8; cursor: pointer; }
.pui-dp-input:focus { border-color: #18171A; background: #fff; }
.pui-dp-divider { height: 1px; background: #F0EFEC; margin: 8px 0; }
.pui-dp-clear { display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: inherit; font-size: 11.5px; color: #AEADAB; padding: 3px 2px; transition: color .12s; }
.pui-dp-clear:hover { color: #18171A; }
.pui-dp-today { background: none; border: 1px solid #D8D7D3; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 11px; color: #555452; padding: 3px 9px; transition: all .12s; }
.pui-dp-today:hover { background: #18171A; color: #fff; border-color: #18171A; }
/* Custom calendar (week / month picker) */
.dp-calendar { width: 224px; }
.dp-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.dp-cal-title { font-size: 12.5px; font-weight: 700; color: #18171A; }
.dp-cal-nav { width: 24px; height: 24px; border: none; background: none; cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #888785; font-size: 15px; line-height: 1; transition: all .12s; }
.dp-cal-nav:hover { background: #F0EFEC; color: #18171A; }
.dp-cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 1px; }
.dp-cal-day-name { text-align: center; font-size: 9px; font-weight: 700; color: #C0BFBC; padding: 2px 0 4px; letter-spacing: 0.3px; }
.dp-cal-week-row { display: grid; grid-template-columns: repeat(7,1fr); border-radius: 6px; cursor: pointer; transition: background .1s; margin: 1px -3px; padding: 0 3px; }
.dp-cal-week-row:hover { background: #F0EFEC; }
.dp-cal-week-row.selected { background: #18171A; }
.dp-cal-week-row.selected .dp-cal-day { color: #fff !important; }
.dp-cal-day-row { display: grid; grid-template-columns: repeat(7,1fr); margin: 1px -3px; padding: 0 3px; }
.dp-cal-day-row .dp-cal-day:hover { background: #F0EFEC; border-radius: 50%; }
.dp-cal-day { text-align: center; font-size: 11px; padding: 5px 0; color: #18171A; line-height: 1.2; }
.dp-cal-day.other-month { color: #D4D3CF; }
.dp-cal-day.is-sat { color: #5B8AC8; }
.dp-cal-day.is-sun { color: #C85B5B; }
/* Month picker grid */
.dp-month-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }
.dp-month-btn { border: 1.5px solid transparent; border-radius: 7px; background: none; cursor: pointer; font-family: inherit; font-size: 12px; color: #18171A; padding: 8px 4px; transition: all .12s; text-align: center; }
.dp-month-btn:hover { background: #F0EFEC; }
.dp-month-btn.selected { background: #18171A; color: #fff; }
.dp-month-btn.used { opacity: 0.28; cursor: not-allowed; }
.dp-month-btn:disabled { pointer-events: none; }
.pui-right { margin-left: auto; pointer-events: auto; display: flex; align-items: center; gap: 6px; }
.pui-timer-time { font-size: 12px; font-weight: 600; color: #AEADAB; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; min-width: 36px; line-height: 1; }
.pui-timer-time.running { color: #3A7BFF; }
.pui-tbtn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #E4E3DF; background: rgba(255,255,255,0.85); color: #AEADAB; cursor: pointer; font-size: 8px; display: flex; align-items: center; justify-content: center; transition: all .15s; font-family: inherit; }
.pui-tbtn:hover { border-color: #1A1918; color: #1A1918; background: #fff; }
.pui-tbtn.playing { background: #1A1918; color: #fff; border-color: #1A1918; }
.pui-tbtn-reset { font-size: 12px; }
</style>
</head>
<body>

<!-- TAB BAR -->
<div id="tab-bar">
  <span class="tb-logo" onclick="goHome()">note</span>
  <div id="tb-tabs"></div>
  <button class="tb-premium-btn on" id="premium-toggle" onclick="togglePremium()">★ 프리미엄</button>
  <button class="tb-store-btn" id="tb-store-btn" onclick="goStore()">스토어</button>
</div>

<main id="app"></main>

<!-- Drawing Layout -->
<div class="gn-layout" id="gn-layout" style="display:none">
  <div class="gn-sidebar" id="gn-sidebar">
    <div class="gn-sb-inner">
      <div class="gn-sb-head" style="cursor:default">
        <span class="gn-sb-nb-name" id="gn-nb-name">노트</span>
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
          <button onclick="openSbCalPopup()" title="날짜 추가" style="background:none;border:none;padding:0;cursor:pointer;color:rgba(255,255,255,0.65);display:flex;align-items:center;transition:color .15s;" onmouseover="this.style.color='rgba(255,255,255,0.95)'" onmouseout="this.style.color='rgba(255,255,255,0.65)'">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2" width="11" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M9 1v2M1 5.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M6.5 7.5v2M5.5 8.5h2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          </button>
          <button onclick="showAddPagePurchaseModal()" title="페이지 추가" style="background:none;border:none;padding:0;cursor:pointer;color:rgba(255,255,255,0.65);display:flex;align-items:center;transition:color .15s;" onmouseover="this.style.color='rgba(255,255,255,0.95)'" onmouseout="this.style.color='rgba(255,255,255,0.65)'">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 5h10l-1.2 7H3.2L2 5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M5 5V4a2 2 0 0 1 4 0v1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="gn-pages-list" id="gn-pages-list"></div>
      <div id="today-float-wrap" style="display:none;padding:6px 10px 2px;flex-shrink:0;">
        <button id="today-float-btn" onclick="goToTodayPage()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 0;border:none;border-radius:7px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:background .15s;">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="2" width="9" height="8" rx="1.5" stroke="currentColor" stroke-width="1.1"/><path d="M3.5 1v2M7.5 1v2M1 5h9" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          오늘
        </button>
      </div>
    </div>
  </div>

  <div class="gn-main">
    <div class="gn-toolbar">
      <button class="tb-icon-btn" onclick="toggleSidebar()" title="사이드바">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <rect y="0" width="15" height="1.8" rx="0.9" fill="currentColor"/>
          <rect y="4.6" width="15" height="1.8" rx="0.9" fill="currentColor"/>
          <rect y="9.2" width="15" height="1.8" rx="0.9" fill="currentColor"/>
        </svg>
      </button>
      <div class="tb-sep"></div>
      <button class="tb-tool-btn active" id="tb-pen" onclick="setDrawTool('pen')">
        <span class="tb-tool-ico" id="tb-pen-ico"></span>펜
      </button>
      <button class="tb-tool-btn" id="tb-hi" onclick="setDrawTool('highlighter')">
        <span class="tb-tool-ico" style="background:#FFE066;border-radius:2px"></span>형광펜
      </button>
      <button class="tb-tool-btn" id="tb-er" onclick="setDrawTool('eraser')">
        <span style="font-size:10px;line-height:1">◻</span>지우개
      </button>
      <div class="tb-sep"></div>
      <div id="tb-colors" style="display:flex;gap:5px;align-items:center"></div>
      <div class="tb-sep"></div>
      <div id="tb-sizes" style="display:flex;gap:4px;align-items:center"></div>
      <div class="tb-spacer"></div>
      <button class="tb-icon-btn" onclick="undoDraw()" title="실행 취소">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M3.5 5H9.5C11.4 5 13 6.6 13 8.5S11.4 12 9.5 12H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M3.5 5L1.5 7l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="tb-icon-btn" onclick="clearDraw()" title="모두 지우기">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M11 8.5L8.5 11M9.5 3L12.5 6L7 11.5H4.5V9L9.5 3Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

    <div class="gn-canvas-area" id="gn-canvas-area">
      <div class="canvas-wrapper" id="canvas-wrapper">

        <div class="canvas-lock-overlay" id="canvas-lock-overlay"></div>
        <div class="page-locked-float" id="page-locked-float">
          <button class="page-locked-float-btn" onclick="showLockedPagePopup()">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="2.5" y="6" width="8" height="5.5" rx="1.5" fill="#FFD040"/><path d="M4 6V4.5a2.5 2.5 0 0 1 5 0V6" stroke="#FFD040" stroke-width="1.4" stroke-linecap="round"/></svg>

                <path d="M4 1v2M8 1v2M1 5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

</div>

<!-- Locked Page Popup -->
<div class="modal-overlay" id="locked-page-modal" onclick="closeLockedPagePopup()">
  <div class="modal" onclick="event.stopPropagation()" style="text-align:center">
    <div id="locked-step1">
      <div style="font-size:28px;margin-bottom:12px">🔒</div>
      <div class="modal-title" style="margin-bottom:6px">잠긴 페이지</div>

// ─── HELPERS ────────────────────────────────────
function fmtTime(sec){
  sec=Math.floor(sec); const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDateShort(s){
  if(!s) return null;
  const d=new Date(s+'T00:00:00');
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}
function fmtDateFull(s){
  if(!s) return null;
  const d=new Date(s+'T00:00:00'), days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}
function fmtWeekStr(s){
  // s = "2026-W10"
  if(!s) return null;
  const [yr, wk] = s.split('-W');
  const year = parseInt(yr), week = parseInt(wk);
  // ISO week: Jan 4 is always in week 1
  const jan4 = new Date(year, 0, 4);
  const weekStart = new Date(jan4.getTime() + (week - 1) * 7 * 86400000);
  // Adjust to Monday
  const day = weekStart.getDay();
  const monday = new Date(weekStart);
  monday.setDate(weekStart.getDate() - ((day + 6) % 7));
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${year}년 ${Math.ceil((monday.getDate() + new Date(year,monday.getMonth(),1).getDay())/7)}주 (${fmt(monday)}~${fmt(sunday)})`;
}
function fmtWeekShort(s){
  if(!s) return null;
  const [yr, wk] = s.split('-W');
  return `${yr}년 ${wk}주차`;
}
function fmtMonthStr(s){
  // s = "2026-03"
  if(!s) return null;
  const [yr, mo] = s.split('-');
  return `${yr}년 ${parseInt(mo)}월`;
}

}
function fmtDateForDisplay(val, nbType){
  if(!val) return '날짜 설정';
  if(nbType==='weekly') return fmtWeekStr(val) || val;
  if(nbType==='monthly') return fmtMonthStr(val) || val;
  return fmtDateFull(val) || val;
}
function fmtDateForThumb(val, nbType){
  if(!val) return '';
  if(nbType==='weekly') return fmtWeekShort(val) || val;
  if(nbType==='monthly') return fmtMonthStr(val) || val;
  return fmtDateShort(val) || val;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtPrice(n){ return '₩'+n.toLocaleString('ko-KR'); }

    const da = nb.pages[a].date, db2 = nb.pages[b].date;
    if(da && db2) return da > db2 ? 1 : da < db2 ? -1 : 0; // 날짜 오름차순
    if(da) return -1; // 날짜 있는 페이지 먼저
    if(db2) return 1;
    return a - b; // 둘 다 없으면 원래 인덱스
  });
}

function renderTabBar(){

function openOrSwitchTab(notebookId){
  const existing = openTabs.findIndex(t=>t.notebookId===notebookId);
  if(existing >= 0){
    activateTab(existing);
  } else {
    // Save current state if in a tab
    if(activeTabIdx >= 0 && openTabs[activeTabIdx]) {
      openTabs[activeTabIdx].pageIdx = state.pageIdx;
      pauseTimer();
    } else {
      stopTimer(false);
    }
    const nb = getNotebook(notebookId);
    const initIdx = getInitialPageIdx(nb);
    openTabs.push({notebookId, pageIdx:initIdx});
    activeTabIdx = openTabs.length - 1;
    state.notebookId = notebookId;
    state.pageIdx = initIdx;
    state.view = 'page';
    enterDrawing();
    renderTabBar();
  }
}

function activateTab(idx){
  if(activeTabIdx === idx) return;
  // Save current tab state
  if(activeTabIdx >= 0 && activeTabIdx < openTabs.length) {
    openTabs[activeTabIdx].pageIdx = state.pageIdx;
    pauseTimer();
  } else {
    stopTimer(false);
  }
  activeTabIdx = idx;
  const tab = openTabs[idx];
  state.notebookId = tab.notebookId;
  state.pageIdx = tab.pageIdx || 0;
  state.view = 'page';
  const nb = getNotebook(tab.notebookId);
  const pg = nb && nb.pages[state.pageIdx];
  state.timer = {running:false, startTime:null, savedTime:pg?.date ? (db.studyRecords[pg.date]||0) : 0, interval:null};
  enterDrawing();
  renderTabBar();
}

function closeTab(idx, e){
  e && e.stopPropagation();
  const wasActive = (activeTabIdx === idx);
  if(wasActive){
    openTabs[idx].pageIdx = state.pageIdx;
    pauseTimer();
  }
  openTabs.splice(idx, 1);
  if(openTabs.length === 0){
    activeTabIdx = -1;
    document.getElementById('gn-layout').style.display = 'none';
    document.body.classList.remove('drawing-mode');
    state.view = 'home';
    render();
  } else if(wasActive){
    const newIdx = Math.min(idx, openTabs.length-1);
    activeTabIdx = -1; // reset before activating
    activateTab(newIdx);
    return;
  } else if(activeTabIdx > idx){
    activeTabIdx--;
  }
  renderTabBar();
}

function renderPurchaseQty(){
  const p = PRODUCTS.find(x=>x.id===pm.productId);
  const grid = document.getElementById('pm-qty-grid');

  if(pm.betweenQty){

      <span class="qb-pages">${qty}장</span>

    </button>`;

    return;
  }

  grid.innerHTML = p.prices.map((pr,i)=>{
    const perPage = Math.round(pr.price / pr.pages);
    return `<button class="pm-qty-btn${pm.qtyIdx===i?' selected':''}" onclick="selectPurchaseQty(${i})">
      <span class="qb-pages">${pr.pages}장</span>
      <span class="qb-price">${isPremium ? '무료' : fmtPrice(perPage)+'/장'}</span>

}

function selectPurchaseQty(idx){
  pm.qtyIdx = idx;
  renderPurchaseQty();
}

function closePurchaseModal(){
  document.getElementById('purchase-modal').classList.remove('show');
  pm.betweenMin = null; pm.betweenMax = null; pm.betweenQty = null; pm.pendingSpareCount = 0;
  window._sbCalPendingDates = null; window._sbCalSpareCount = 0;
}

function confirmPurchase(){
  const p = PRODUCTS.find(x=>x.id===pm.productId);
  const sel = p.prices[pm.qtyIdx];
  const pageCount = pm.betweenQty || sel.pages;

  if(pm.mode === 'addPage'){
    const nb = getNotebook(pm.notebookId || state.notebookId);
    if(!nb) return;
    const insertIdx = pm.insertIdx;
    const pendingSpare = pm.pendingSpareCount || 0;
    const sbCalDates = window._sbCalPendingDates ? [...window._sbCalPendingDates] : null;
    closePurchaseModal();

    if(pendingSpare > 0){
      // mixed: use spare first, then add purchased pages after them
      _doUseSparePages(insertIdx, pendingSpare, true);
      const purchaseInsert = insertIdx !== null ? insertIdx + pendingSpare : nb.pages.length;
      const newPages = Array.from({length:pageCount},()=>({date:null, origin: isPremium ? 'premium' : 'paid'}));
      nb.pages.splice(purchaseInsert, 0, ...newPages);
      saveData();
      showToast(`종이 ${pendingSpare + pageCount}장이 추가되었어요 ✓`);
      renderSidebarPages();
    } else {
      const newPages = Array.from({length:pageCount},()=>({date:null, origin: isPremium ? 'premium' : 'paid'}));
      if(insertIdx !== null && insertIdx !== undefined){
        nb.pages.splice(insertIdx, 0, ...newPages);
        if(state.pageIdx >= insertIdx){
          state.pageIdx += pageCount;
          if(openTabs[activeTabIdx]) openTabs[activeTabIdx].pageIdx = state.pageIdx;
        }
      } else {
        nb.pages.push(...newPages);
      }
      const firstNewIdx = (insertIdx !== null && insertIdx !== undefined) ? insertIdx : nb.pages.length - pageCount;
      saveData();
      showToast(`종이 ${pageCount}장이 추가되었어요 ✓`);
      renderSidebarPages();
      if(sbCalDates){
        _sbCalBindDates(sbCalDates);
        return;
      }
      switchPage(firstNewIdx);
    }
  } else {
    // Create new notebook
    const color = NB_COLORS[db.notebooks.length % NB_COLORS.length];
    const existingCount = db.notebooks.filter(n=>n.type===p.id).length;
    const name = existingCount > 0 ? `${p.name} ${existingCount+1}` : p.name;
    const nb = {
      id: uid(), name, type: p.id, color,
      pages: Array.from({length:sel.pages},()=>({date:null, origin: isPremium ? 'premium' : 'paid'}))
    };
    db.notebooks.push(nb); saveData();
    closePurchaseModal();
    showToast(`"${name}"이 추가되었어요 ✓`);
    setTimeout(()=>openOrSwitchTab(nb.id), 400);
  }
}

function showAddPagePurchaseModal(){
  const nb = getNotebook(state.notebookId); if(!nb) return;

  pm.pendingSpareCount = 0;

function _doUseSparePages(insertIdx, qty, silent){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  qty = Math.min(qty, nb.pages.filter(p => !p.date).length);
  if(qty <= 0) return;

  const spareIndices = [];
  for(let i = nb.pages.length - 1; i >= 0 && spareIndices.length < qty; i--){
    if(!nb.pages[i].date) spareIndices.push(i);
  }
  spareIndices.sort((a,b) => b-a);
  const taken = spareIndices.map(i => { const [p] = nb.pages.splice(i,1); return p; }).reverse();

  const shift = spareIndices.filter(i => insertIdx !== null && i < insertIdx).length;
  const realInsert = insertIdx !== null ? Math.max(0, insertIdx - shift) : nb.pages.length;

  const removedBefore = spareIndices.filter(i => i < state.pageIdx).length;
  state.pageIdx -= removedBefore;
  if(openTabs[activeTabIdx]) openTabs[activeTabIdx].pageIdx = state.pageIdx;

  nb.pages.splice(realInsert, 0, ...taken);

  if(state.pageIdx >= realInsert) state.pageIdx += qty;
  state.pageIdx = realInsert;
  if(openTabs[activeTabIdx]) openTabs[activeTabIdx].pageIdx = state.pageIdx;

  saveData();
  if(!silent) showToast(`종이 ${qty}장이 추가되었어요 ✓`);
  switchPage(realInsert);
  renderSidebarPages();
}

// ─── SIDEBAR CALENDAR POPUP ─────────────────────
let sbCalState = { year: new Date().getFullYear(), month: new Date().getMonth() };
let sbCalRange = { start: null, end: null };

function openSbCalPopup(){
  sbCalRange = { start: null, end: null };
  const today = new Date();
  sbCalState = { year: today.getFullYear(), month: today.getMonth() };
  renderScalGrid();
  document.getElementById('scal-overlay').classList.add('show');
}

function closeSbCalPopup(){
  document.getElementById('scal-overlay').classList.remove('show');
  sbCalRange = { start: null, end: null };
}

function scNavMonth(delta){
  sbCalState.month += delta;
  if(sbCalState.month < 0){ sbCalState.month=11; sbCalState.year--; }
  if(sbCalState.month > 11){ sbCalState.month=0; sbCalState.year++; }
  renderScalGrid();
}

function getScalRangeDates(){
  if(!sbCalRange.start) return [];
  if(!sbCalRange.end) return [sbCalRange.start];
  const dates = [];
  const cursor = new Date(sbCalRange.start);
  const end = new Date(sbCalRange.end);
  while(cursor <= end){
    dates.push(`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`);
    cursor.setDate(cursor.getDate()+1);
  }
  return dates;
}

function renderScalGrid(){
  const nb = getNotebook(state.notebookId); if(!nb) return;

  const takenDates = new Set(nb.pages.filter(pg=>pg.date).map(pg=>pg.date));
  const rangeDates = getScalRangeDates();
  const shortageEl = document.getElementById('scal-shortage-msg');
  if(shortageEl) shortageEl.style.display = 'none';

  const { year, month } = sbCalState;
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames = ['월','화','수','목','금','토','일'];
  const todayIso = getTodayIso();
  const rangeSet = new Set(rangeDates);

  document.getElementById('scal-title').textContent = `${year}년 ${monthNames[month]}`;
  document.getElementById('scal-days-hdr').innerHTML = dayNames.map(n=>`<div class="scal-day-name">${n}</div>`).join('');

  const firstDay = new Date(year, month, 1);
  const dow = (firstDay.getDay()+6)%7;
  const cursor = new Date(year, month, 1-dow);

  let rows='';
  for(let w=0; w<6; w++){
    let hasMonth=false;
    const cells=[];
    for(let d=0; d<7; d++){
      const inMonth = cursor.getMonth()===month;
      if(inMonth) hasMonth=true;
      const dayNum=cursor.getDate(), dow2=cursor.getDay();
      const isoDate=`${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      cells.push({dayNum,inMonth,dow2,isoDate});
      cursor.setDate(cursor.getDate()+1);
    }
    if(!hasMonth && w>0) break;

    rows+=`<div class="scal-row">${cells.map(({dayNum,inMonth,dow2,isoDate})=>{
      const isTaken = takenDates.has(isoDate);
      const isStart = isoDate === sbCalRange.start;
      const isEnd   = isoDate === sbCalRange.end;
      const inRange = rangeSet.has(isoDate) && !isStart && !isEnd;
      const isToday = isoDate === todayIso;

      let cls='scal-day';
      if(!inMonth) cls+=' scal-other';
      else if(dow2===6) cls+=' scal-sat';
      else if(dow2===0) cls+=' scal-sun';
      if(isTaken) cls+=' scal-taken';
      else if(isStart || isEnd) cls+=' scal-range-start';
      else if(inRange) cls+=' scal-in-range';
      else if(isToday) cls+=' scal-today';

      const dot = (isTaken || isStart || isEnd || inRange)
        ? `<div class="scal-dot${(isStart||isEnd) ? ' dot-range' : ''}"></div>`
        : `<div class="scal-dot-ph"></div>`;

      const clickFn = `onclick="scPickDate('${isoDate}')"`;
      return `<div class="${cls}" ${clickFn}><div class="scal-num">${dayNum}</div>${dot}</div>`;
    }).join('')}</div>`;
  }

  document.getElementById('scal-grid').innerHTML = rows;
  const btn = document.getElementById('scal-confirm-btn');
  btn.disabled = rangeDates.length === 0;
  btn.textContent = '적용';
}

function scPickDate(isoDate){
  if(!sbCalRange.start || sbCalRange.end){
    // 새 범위 시작
    sbCalRange = { start: isoDate, end: null };
  } else {
    // 종료일 설정 (시작보다 앞이면 swap)
    if(isoDate < sbCalRange.start){
      sbCalRange = { start: isoDate, end: sbCalRange.start };
    } else if(isoDate === sbCalRange.start){
      sbCalRange = { start: null, end: null };
    } else {
      sbCalRange.end = isoDate;
    }
  }
  renderScalGrid();
}

function sbCalConfirm(){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  const takenDates = new Set(nb.pages.filter(pg=>pg.date).map(pg=>pg.date));
  const dates = getScalRangeDates().filter(d=>!takenDates.has(d));
  if(!dates.length){ closeSbCalPopup(); return; }

  const sparePages = nb.pages.filter(pg=>!pg.date&&!isPageLocked(pg));
  const needBuy = Math.max(0, dates.length - sparePages.length);

  if(needBuy === 0){
    closeSbCalPopup();
    _sbCalBindDates(dates);
  } else {
    window._sbCalPendingDates = dates;
    window._sbCalSpareCount = sparePages.length;
    document.getElementById('scal-overlay').classList.remove('show'); // range 유지
    document.getElementById('scal-sh-selected').textContent = `${dates.length}일`;
    document.getElementById('scal-sh-need').textContent = `${needBuy}장`;
    document.getElementById('scal-shortage-buy-btn').textContent = `${needBuy}장 구매하기`;
    document.getElementById('scal-shortage-modal').classList.add('show');
  }
}

function closeScalShortage(){
  document.getElementById('scal-shortage-modal').classList.remove('show');
  window._sbCalPendingDates = null;
  window._sbCalSpareCount = 0;
}

function reopenSbCalPopup(){
  renderScalGrid();
  document.getElementById('scal-overlay').classList.add('show');
}

function sbCalDoPurchase(){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  const needBuy = Math.max(0, (window._sbCalPendingDates?.length||0) - (window._sbCalSpareCount||0));
  document.getElementById('scal-shortage-modal').classList.remove('show');
  pm.betweenQty = needBuy;
  pm.insertIdx = null;
  pm.pendingSpareCount = 0;
  openPurchaseModal('addPage', nb.type, nb.id);
}

function _sbCalBindDates(dates){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  let lastIdx = -1;
  dates.forEach(date=>{
    const spareIdx = nb.pages.findIndex(pg=>!pg.date&&!isPageLocked(pg));
    if(spareIdx>=0){ nb.pages[spareIdx].date=date; lastIdx=spareIdx; }
  });
  saveData();
  renderSidebarPages();
  if(lastIdx>=0) switchPage(lastIdx);
  showToast(`${dates.length}개 날짜가 추가됐어요 ✓`);
}

function renderSidebarPages(){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  const list = document.getElementById('gn-pages-list'); if(!list) return;
  const sortedIndices = getSortedPageIndices();
  const thumbs = sortedIndices.map(i=>{
    const pg = nb.pages[i];
    const locked = isPageLocked(pg);
    return `<div class="gn-page-thumb-wrap ${i===state.pageIdx?'active':''}" id="gn-tw-${i}" onclick="switchPage(${i})">
      <div class="gn-thumb-img-wrap">
        <canvas class="gn-thumb-canvas" id="gn-tc-${i}" width="190" height="253"></canvas>
        ${locked ? `<div class="gn-lock-overlay"><svg width="18" height="18" viewBox="0 0 22 22" fill="none"><rect x="5" y="10" width="12" height="9" rx="2" fill="rgba(255,255,255,0.9)"/><path d="M7.5 10V7.5a3.5 3.5 0 0 1 7 0V10" stroke="rgba(255,255,255,0.9)" stroke-width="1.8" stroke-linecap="round"/></svg></div>` : ''}
      </div>
      <div class="gn-thumb-label">

function initCanvas(){
  canvasEl = document.getElementById('draw-canvas'); if(!canvasEl) return;
  const area = document.getElementById('gn-canvas-area');
  const dpr = window.devicePixelRatio||1;
  const aW = area.clientWidth-56, aH = area.clientHeight-56;
  let cW = Math.min(Math.max(aW,320),760);
  let cH = Math.round(cW*(4/3));
  if(cH>aH){ cH=aH; cW=Math.round(cH*0.75); }
  canvasEl.style.width = cW+'px'; canvasEl.style.height = cH+'px';
  canvasEl.width = Math.round(cW*dpr); canvasEl.height = Math.round(cH*dpr);
  canvasEl._dpr = dpr; canvasEl._cssW = cW; canvasEl._cssH = cH;
  ctx = canvasEl.getContext('2d');
  ctx.scale(dpr, dpr);
  const paperUI = document.getElementById('paper-ui');
  if(paperUI) paperUI.style.height = Math.round(cH*HEADER_RATIO)+'px';
  updatePaperUI();
  redrawCanvas();

}

// ─── DATE POPUP ─────────────────────────────────
let dpState = { year: new Date().getFullYear(), month: new Date().getMonth() };

function getDateBoundsForPage(pageIdx, nb){
  if(!nb) return {min:null, max:null};
  let min=null, max=null;
  nb.pages.forEach((pg,i)=>{
    if(i===pageIdx||!pg.date) return;
    if(i < pageIdx){ if(!min||pg.date>min) min=pg.date; } // 앞 페이지 → 그 이후여야 함
    else           { if(!max||pg.date<max) max=pg.date; } // 뒤 페이지 → 그 이전이어야 함
  });
  return {min, max};
}

function isDateLocked(pg, nb){
  if(!pg || !pg.date || !nb) return false;
  const today = getTodayIso();
  if(nb.type === 'weekly')  return pg.date <= getISOWeek(new Date(today));
  if(nb.type === 'monthly') return pg.date <= today.slice(0,7);
  return pg.date <= today; // daily / default
}

function getTodayIso(){ const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
const DP_CLEAR_BTN = `<div class="pui-dp-divider"></div>
<div style="display:flex;justify-content:flex-end;">
  <button class="pui-dp-today" onclick="selectTodayDate()">오늘</button>
</div>`;

function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const y1 = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return `${d.getUTCFullYear()}-W${String(Math.ceil(((d-y1)/86400000+1)/7)).padStart(2,'0')}`;
}

function dpCalHeader(title, navFn){
  return `<div class="dp-cal-header">
    <button class="dp-cal-nav" onclick="${navFn}(-1)">‹</button>
    <span class="dp-cal-title">${title}</span>
    <button class="dp-cal-nav" onclick="${navFn}(1)">›</button>
  </div>`;
}

function renderCalGrid(selectedVal, onClickFn, isWeekMode, usedDates=new Set(), bounds={min:null,max:null}, navFn='dpNav', yr=null, mo=null){
  const year = yr ?? dpState.year;
  const month = mo ?? dpState.month;
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames = ['월','화','수','목','금','토','일'];

  // Find Monday of week containing first of month
  const firstDay = new Date(year, month, 1);
  const dow = (firstDay.getDay() + 6) % 7; // 0=Mon
  const cursor = new Date(year, month, 1 - dow);

  let rows = '';
  for(let w=0; w<6; w++){
    const weekMonday = new Date(cursor);
    const isoWeek = getISOWeek(weekMonday);
    let cells = '';
    let hasCurrentMonth = false;
    const dayDates = [];
    for(let d=0; d<7; d++){
      const inMonth = cursor.getMonth() === month;
      if(inMonth) hasCurrentMonth = true;
      const dayNum = cursor.getDate();
      const dow2 = cursor.getDay();
      const isoDate = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      const cls = ['dp-cal-day', !inMonth?'other-month':'', dow2===6?'is-sat':'', dow2===0?'is-sun':''].filter(Boolean).join(' ');
      dayDates.push({dayNum, cls, isoDate});
      cursor.setDate(cursor.getDate()+1);
    }
    if(!hasCurrentMonth && w > 0) break;

    if(isWeekMode){
      const isSelected  = (selectedVal === isoWeek);
      const isUsed      = !isSelected && usedDates.has(isoWeek);
      const todayIso    = getTodayIso();
      const isThisWeek  = dayDates.some(d => d.isoDate === todayIso);
      const rowCls = `dp-cal-week-row${isSelected?' selected':''}${(!isSelected&&isThisWeek&&!isUsed)?' this-week':''}${isUsed?' used':''}`;
      rows += `<div class="${rowCls}" ${isUsed?'style="opacity:0.28;cursor:not-allowed;"':`onclick="${onClickFn}('${isoWeek}')"`}>
        ${dayDates.map(d=>{
          const isToday = d.isoDate === todayIso;
          let style = '';
          if(isToday && !isSelected) style = 'outline:1.5px solid #18171A;outline-offset:-1px;border-radius:50%;width:26px;height:26px;line-height:26px;margin:0 auto;font-weight:700;';
          return `<div class="${d.cls}"${style?' style="'+style+'"':''}>${d.dayNum}</div>`;
        }).join('')}
      </div>`;
    } else {
      const todayIso = getTodayIso();
      rows += `<div class="dp-cal-day-row">
        ${dayDates.map(d=>{
          const isSel   = (selectedVal === d.isoDate);
          const isToday = (d.isoDate === todayIso);
          const isUsed  = !isSel && usedDates.has(d.isoDate);
          const isOOB   = !isSel && ((bounds.min && d.isoDate <= bounds.min) || (bounds.max && d.isoDate >= bounds.max));
          const isBlock = isUsed || isOOB;
          let style = `border-radius:50%;width:26px;height:26px;line-height:26px;margin:1px auto;padding:0;`;
          if(isSel)             style += 'cursor:pointer;background:#18171A;color:#fff!important;';
          else if(isUsed)       style += 'cursor:not-allowed;background:#ECEAE6;color:#B0AFAB!important;';
          else if(isOOB && isToday) style += 'cursor:not-allowed;outline:1.5px solid #C0BFBC;outline-offset:-1px;font-weight:700;opacity:0.35;';
          else if(isToday)      style += 'cursor:pointer;outline:1.5px solid #18171A;outline-offset:-1px;font-weight:700;';
          else if(isOOB)        style += 'cursor:not-allowed;opacity:0.25;';
          else                  style += 'cursor:pointer;';
          return `<div class="${d.cls}" style="${style}" ${isBlock?'':` onclick="${onClickFn}('${d.isoDate}')"`}>${d.dayNum}</div>`;
        }).join('')}
      </div>`;
    }
  }

  return `${dpCalHeader(`${year}년 ${monthNames[month]}`, navFn)}
    <div class="dp-cal-days-header">${dayNames.map(n=>`<div class="dp-cal-day-name">${n}</div>`).join('')}</div>
    ${rows}`;
}

function getUsedDates(){
  const nb = getNotebook(state.notebookId); if(!nb) return new Set();
  return new Set(nb.pages.filter((pg,i)=> i !== state.pageIdx && pg.date).map(pg=>pg.date));
}

function renderMonthPickerContent(){
  const nb = getNotebook(state.notebookId);
  const pg = nb && nb.pages[state.pageIdx];
  const sel = pg?.date || null;
  const used = getUsedDates();
  const { year } = dpState;
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const grid = months.map((m,i)=>{
    const val = `${year}-${String(i+1).padStart(2,'0')}`;
    const isUsed = used.has(val);
    const isSel  = val === sel;
    return `<button class="dp-month-btn${isSel?' selected':''}${isUsed?' used':''}" ${isUsed?'disabled':''} onclick="${isUsed?'':'selectMonth(\''+val+'\')'}">${m}</button>`;
  }).join('');
  return `<div class="dp-calendar">
    ${dpCalHeader(`${year}년`,'dpNavYear')}
    <div class="dp-month-grid">${grid}</div>
    ${DP_CLEAR_BTN}
  </div>`;
}

function dpNav(delta){
  dpState.month += delta;
  if(dpState.month < 0){ dpState.month=11; dpState.year--; }
  if(dpState.month > 11){ dpState.month=0; dpState.year++; }
  refreshDpContent();
}
function dpNavYear(delta){ dpState.year += delta; refreshDpContent(); }

function refreshDpContent(){
  const nb = getNotebook(state.notebookId);
  const content = document.getElementById('pui-dp-content'); if(!content) return;
  const type = nb?.type;
  const label = document.getElementById('pui-dp-label');
  if(label) label.style.display = '';
  const subEl = document.getElementById('pui-dp-header-sub');
  if(subEl){
    if(type==='weekly')       subEl.textContent = '주를 선택해주세요';
    else if(type==='monthly') subEl.textContent = '월을 선택해주세요';
    else                      subEl.textContent = '날짜를 선택해주세요';
  }
  if(type==='weekly') content.innerHTML = renderWeekPickerContent();
  else if(type==='monthly') content.innerHTML = renderMonthPickerContent();
  else content.innerHTML = renderDailyPickerContent();
}

function hasPageContent(pg){
  if(!pg || !pg.date) return false;
  const strokes = db.strokesByDate[pg.date] || [];
  const studyTime = db.studyRecords[pg.date] || 0;

}

let sbPageDpState = { targetIdx:-1, year:new Date().getFullYear(), month:new Date().getMonth() };

function openSbPageDatePicker(idx, e){
  e.stopPropagation();
  const popup = document.getElementById('sb-page-dp'); if(!popup) return;
  if(sbPageDpState.targetIdx === idx && popup.style.display !== 'none'){
    closeSbPageDatePicker(); return;
  }
  sbPageDpState.targetIdx = idx;
  const today = new Date();
  sbPageDpState.year = today.getFullYear();
  sbPageDpState.month = today.getMonth();
  refreshSbPageDp();
  popup.style.display = 'block';
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const popupW = 258;
  let left = rect.right + 6;
  if(left + popupW > window.innerWidth - 8) left = rect.left - popupW - 6;
  let top = rect.top;
  const popupH = 320;
  if(top + popupH > window.innerHeight - 8) top = window.innerHeight - popupH - 8;
  popup.style.left = Math.max(8, left) + 'px';
  popup.style.top = Math.max(8, top) + 'px';
}

function closeSbPageDatePicker(){
  const popup = document.getElementById('sb-page-dp');
  if(popup) popup.style.display = 'none';
  sbPageDpState.targetIdx = -1;
}

function sbDpNav(delta){
  sbPageDpState.month += delta;
  if(sbPageDpState.month < 0){ sbPageDpState.month=11; sbPageDpState.year--; }
  if(sbPageDpState.month > 11){ sbPageDpState.month=0; sbPageDpState.year++; }
  refreshSbPageDp();
}
function sbDpNavYear(delta){ sbPageDpState.year += delta; refreshSbPageDp(); }

function refreshSbPageDp(){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  const idx = sbPageDpState.targetIdx;
  const pg = nb.pages[idx]; if(!pg) return;
  const content = document.getElementById('sb-page-dp-content'); if(!content) return;
  const usedDates = new Set(nb.pages.filter((_,i)=> i !== idx && nb.pages[i].date).map(p=>p.date));
  const yr = sbPageDpState.year, mo = sbPageDpState.month;
  let html;
  if(nb.type === 'weekly'){
    html = `<div class="dp-calendar">${renderCalGrid(pg.date,'sbSelectDate',true,usedDates,{},'sbDpNav',yr,mo)}</div>`;
  } else if(nb.type === 'monthly'){
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const grid = months.map((m,i)=>{
      const val = `${yr}-${String(i+1).padStart(2,'0')}`;
      const isUsed = usedDates.has(val), isSel = val === pg.date;
      return `<button class="dp-month-btn${isSel?' selected':''}${isUsed?' used':''}" ${isUsed?'disabled':''} onclick="${isUsed?'':'sbSelectDate(\''+val+'\')'}">${m}</button>`;
    }).join('');
    html = `<div class="dp-calendar">${dpCalHeader(`${yr}년`,'sbDpNavYear')}<div class="dp-month-grid">${grid}</div></div>`;
  } else {
    html = `<div class="dp-calendar">${renderCalGrid(pg.date,'sbSelectDate',false,usedDates,{},'sbDpNav',yr,mo)}</div>`;
  }
  content.innerHTML = html;
}

function setSbPageDate(idx, val){
  const nb = getNotebook(state.notebookId); if(!nb) return;
  const pg = nb.pages[idx]; if(!pg) return;
  pg.date = val || null;
  autoFlushTrappedPages(nb);
  saveData();
  // 현재 활성 페이지면 UI도 갱신
  if(idx === state.pageIdx){
    const dateText = document.getElementById('pui-date-text');
    if(dateText) dateText.textContent = val ? fmtDateForDisplay(val, nb.type) : '날짜 설정';
    state.timer.savedTime = val ? (db.studyRecords[val]||0) : 0;
    redrawCanvas();
  }
  renderSidebarPages();
}

function toggleDatePopup(e){
  e && e.stopPropagation();
  const nb = getNotebook(state.notebookId), pg = nb&&nb.pages[state.pageIdx];
  if(isPageLocked(pg)) return;
  const popup = document.getElementById('pui-date-popup'); if(!popup) return;
  const isOpen = popup.classList.contains('show');
  if(!isOpen){
    const today = new Date();
    dpState.year = today.getFullYear(); dpState.month = today.getMonth();
    if(pg?.date && hasPageContent(pg)){
      showLockedDateUI();
    } else if(pg?.date){
      showDateRemoveUI();
    } else {
      refreshDpContent();
    }
  }
  popup.classList.toggle('show', !isOpen);
}
